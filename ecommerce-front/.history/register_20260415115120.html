<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب جديد | Brand Not Found</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/products.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">Brand Not Found</div>
        <ul class="menu">
            <li><a href="index.html">الرئيسية</a></li>
        </ul>
    </nav>

    <div class="layout" style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
        <div class="product-card" style="width: 100%; max-width: 450px; cursor: default;">
            <h2 style="margin-bottom: 20px;">إنشاء حساب جديد</h2>
            <form id="registerForm">
                <div style="text-align: right; margin-bottom: 15px;">
                    <label>الاسم الكامل</label>
                    <input type="text" id="regName" style="width: 100%; padding: 10px; margin-top: 5px; border-radius: 5px; border: 1px solid #ccc;" required>
                </div>
                <div style="text-align: right; margin-bottom: 15px;">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="regEmail" style="width: 100%; padding: 10px; margin-top: 5px; border-radius: 5px; border: 1px solid #ccc;" required>
                </div>
                <div style="text-align: right; margin-bottom: 15px;">
                    <label>كلمة المرور</label>
                    <input type="password" id="regPassword" style="width: 100%; padding: 10px; margin-top: 5px; border-radius: 5px; border: 1px solid #ccc;" required>
                </div>
                <button type="submit" style="width: 100%; padding: 12px; font-size: 16px;">تسجيل</button>
            </form>
            <p style="margin-top: 15px; font-size: 14px;">لديك حساب بالفعل؟ <a href="login.html" style="color: black; font-weight: bold;">سجل دخولك</a></p>
        </div>
    </div>

    <footer>
        <p>جميع الحقوق محفوظة &copy; 2026 - Brand Not Found</p>
    </footer>

    <script type="module" src="js/main.js"></script>
</body>
</html>
