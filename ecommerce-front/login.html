<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Brand Not Found</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/auth.css"> 
</head>
<body>

    <nav class="navbar">
        <div class="logo">Brand Not Found</div>
        <ul class="menu">
            <li><a href="index.html">HOME</a></li>
            <li><a href="./pages/products.html">PRODUCTS</a></li>
        </ul>
    </nav>

    <div class="auth-layout">
        <div class="auth-box">
            <h2>Login</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="loginEmail" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="********" required>
                </div>
                <button type="submit" class="auth-btn">Sign In</button>
            </form>
            <p class="auth-footer">Don't have an account? <a href="register.html">Create Account</a></p>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 - Brand Not Found | All Rights Reserved</p>
    </footer>

    <script type="module" src="./js/auth.js"></script>
</body>
</html>
